<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Index Study Lab</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23fffaf2'/%3E%3Cpath d='M18 46V18h8v20h20v8H18Z' fill='%230d5f4d'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./app/styles.css">
    <script type="module" src="./app/main.js"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">Research Workspace</p>
          <h1>Index Study Lab</h1>
          <p class="lead">
            Run repeatable market studies from one calm workspace.
          </p>
        </div>

        <section class="panel">
          <label class="field-label" for="study-select">Study</label>
          <select id="study-select" class="input"></select>
          <div id="study-meta" class="meta-stack"></div>
        </section>

        <section class="panel run-history-panel">
          <p class="meta-label">Recent Runs</p>
          <div id="run-history"></div>
        </section>
      </aside>

      <main class="workspace">
        <div id="study-root"></div>
      </main>
    </div>
  </body>
</html>
