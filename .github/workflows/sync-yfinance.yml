name: Sync YFinance Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sync dependencies
        run: pip install -r requirements-sync.txt

      - name: Refresh snapshots
        run: ./scripts/refresh_yfinance.sh --period 5y

      - name: Commit refreshed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/snapshots; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git add data/snapshots
          git commit -m "chore(data): refresh yfinance snapshots"
          git push
