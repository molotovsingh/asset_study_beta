name: Sync YFinance Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"

concurrency:
  group: sync-yfinance-snapshots-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install sync dependencies
        run: pip install -r requirements-sync.txt

      - name: Refresh snapshots
        run: ./scripts/refresh_yfinance.sh --period 5y

      - name: Run frontend regressions against refreshed snapshots
        run: node scripts/run_frontend_regression_checks.mjs

      - name: Commit refreshed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/snapshots; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git add data/snapshots
          git commit -m "chore(data): refresh yfinance snapshots"
          git push
