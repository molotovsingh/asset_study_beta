name: Validate Repo

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py

      - name: Validate bundled snapshots
        run: python3 scripts/validate_yfinance_snapshots.py --require-all-configured

      - name: Run frontend regression checks
        run: node scripts/run_frontend_regression_checks.mjs
